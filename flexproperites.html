<!DOCTYPE html>
<html lang="en">
<head>
    <style>
.navbar {
    display: flex;
    justify-content: space-between;  
    align-items: center;
    padding: 15px 40px;
    background-color: whitesmoke;
}
.logo {
    display: flex;
    flex-direction: column; 
    align-items: center;  
    font-size: 20px;
    font-weight: bold;
    color: rgba(182, 10, 239, 0.956);
}
.logo img {
    width: 80px; 
    height: 50px;
    margin-bottom: 5px;
}
.nav-links {
    list-style: none;
    display: flex;        
    gap: 25px;            
}
.nav-links a {
    text-decoration: none;
    color: #333;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 4px;
    transition: 0.3s;
}
.nav-links a.active {
    background-color:rgba(182, 10, 239, 0.956);
    color: white;
}
.nav-links a:hover {
    background-color: rgba(182, 10, 239, 0.956);
    color: white;
}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="images.html/sac-logo.png" alt="sac.png">
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">Admin Login</a></li>
            <li><a href="#">Leaderboard</a></li>
            <li><a href="#">Forum</a></li>
            <li><a href="#">Resources</a></li>
        </ul>
    </nav>
</body>
</html>
