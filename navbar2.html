<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
   
    <style>

.css{
    display: flex;
    justify-content: space-between;
    padding: 60px;
    background: rgb(255, 255, 255);

.nav{

}

.p{
    font-size: 14px;
    color: rgb(98, 97, 97);
    margin-top: 15px;
}
.icons {
    display: flex;
    gap: 10px;
}

.icons div {
    width: 40px;
    height: 40px;
    border: 1px solid rgb(204, 204, 204);
    border-radius: 50%;
    text-align: center;
    line-height: 40px;
    font-size: 12px;
}

.footer{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 60px;
    border-top: 1px solid rgb(238, 238, 238);
    font-size: 14px;
    border-radius: 20px;
}

.button{
    padding: 8px 20px;
    border-radius: 30px;
    border: 1px solid rgb(68, 68, 68);
    background: none;
    cursor: pointer;
    
}
.we{
    border-radius: 20px;
    padding: 10px;

<div class="css">

        <h2>VR<div></div>
            <div>Associates</div>

    </div>
    <div class="nav">
        <h4>NAVIGATION</h4>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>services</li>

    <div class="nav">

        <ul>
            <li>Privacy Policy</li>
            <li>Terms & Conditions</li>
        </ul>
    </div>
    <div class="nav">

        <div class="icons">
            <div><i class="fa-brands fa-instagram"></i></div>
            <div><i class="fa-brands fa-facebook"></i></div>
            <div><i class="fa-brands fa-linkedin-in"></i></div>
            <div><i class="fa-brands fa-youtube"></i></div>
        </div>
    </div>

</div>
<div class="footer">
