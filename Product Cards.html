<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Cards</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  background: white;
  padding: 20px;
}

.product-grid {
  display: flex;              
  flex-wrap: wrap;      
  gap: 20px;                  
  justify-content: center;    
}
.card {
  background: lightblue;
  border-radius: 8px;
  box-shadow: 0 2px 6px black;
  padding: 15px;
  text-align: center;
  width: 250px;      
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card img {
  width: 100%;
  border-radius: 6px;
}
.card h3 {
  margin: 10px 0;
}
.card p {
  color: lightgray;
}
.card button {
  margin-top: 10px;
  padding: 10px;
  background: rgb(66, 66, 217);
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.card:hover {
  transform: scale(1.05);
  box-shadow: gray;
}
.card button:hover {
  background: blue;
}
@media (max-width: 600px) {
  .card {
    width: 100%;   
  }
}
  </style>
</head>
<body>
  <h1>My Products</h1>
  <div class="product-grid">
    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Product 1">
      <h3>Product 1</h3>
      <p>Short description of product 1.</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="Product 2">
      <h3>Product 2</h3>
      <p>Short description of product 2.</p>
      <button>Add to Cart</button>
    </div>
  </div>
</body>
</html>
