<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"> 
    <style>
.css{
    display: flex;
    padding: 80px;
    gap: 80px;
}
.abc{
    width: 50%;
}
.abc h2 {
    font-size: 32px;
    color: rgb(11, 28, 61);
    margin-bottom: 40px;
}
.abc input, .k {
    width: 100%;
    padding: 12px ;
    margin-bottom: 30px;
}

.contact{
    width: 50%;
}
.contact h2 {
    font-size: 32px;
    color: rgb(11, 28, 61);
    margin-bottom: 40px;
}
.box {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
}
.icon {
    font-size: 22px;
}
.box div {
   
    color: rgb(119, 119, 119);
    font-size: 12px;
}
.box p {
    margin: 5px;
    font-size: 15px;
    color: rgb(17, 17, 17);
}
    </style>
</head>
<body>
<div class="css">
    <div class="abc">
        <h2>Send a Message</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Phone">
        <input class="k" placeholder="Message"></input>
    </div>
    <div class="contact">
        <h2>Get in Touch</h2>
        <div class="box">
            <div class="icon"><i class="fa-solid fa-phone"></i></div>
            <div>
                <div>PHONE</div>
                <p>+91 98765 43210</p>
            </div>
        </div>
        <div class="box">
            <div class="icon"><i class="fa-regular fa-envelope"></i></div>
            <div>
                <div>EMAIL</div>
                <p>info@vrassociates.com</p>
            </div>
        </div>
        <div class="box">
            <div class="icon"><i class="fa-solid fa-location-dot"></i></div>
            <div>
                <div>ADDRESS</div>
                <p> VR Associates Corporate Office <br>
                    Hyderabad, Telangana</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
